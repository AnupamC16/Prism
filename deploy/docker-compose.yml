version: '3.8'

services:
  prism:
    build: 
      context: ../
      dockerfile: Dockerfile
    environment:
      PORT: ":8080"
      LOG_LEVEL: "info"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: "${JWT_SECRET}"
      TOKEN_TTL_SECONDS: "3600"
      WIDEVINE_URL: "${WIDEVINE_URL}"
      WIDEVINE_API_KEY: "${WIDEVINE_API_KEY}"
      FAIRPLAY_URL: "${FAIRPLAY_URL}"
      FAIRPLAY_CERT_URL: "${FAIRPLAY_CERT_URL}"
      FAIRPLAY_SECRET: "${FAIRPLAY_SECRET}"
      PLAYREADY_URL: "${PLAYREADY_URL}"
      CLOUDFRONT_DOMAIN: "${CLOUDFRONT_DOMAIN}"
      CLOUDFRONT_KEY_PAIR_ID: "${CLOUDFRONT_KEY_PAIR_ID}"
      CLOUDFRONT_PRIVATE_KEY: "${CLOUDFRONT_PRIVATE_KEY}"
      MANIFEST_CACHE_TTL: "30"
      LICENSE_CACHE_TTL: "300"
      VERSION: "1.0.0"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - prism-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - prism-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - prism-net

networks:
  prism-net:
    driver: bridge

volumes:
  redis-data:
