apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: prism
  namespace: prism
  labels:
    app.kubernetes.io/name: prism
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: prism
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: prism
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
